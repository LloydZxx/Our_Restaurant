{% extends 'base.html' %}
{% block body %}

<style>
    /* CSS Styling */
    .form-container {
        max-width: 500px;
        margin: 40px auto;
        padding: 30px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .form-title {
        font-size: 24px;
        color: #2c3e50;
        text-align: center;
        margin-bottom: 25px;
        font-weight: 600;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #555;
        margin-bottom: 8px;
    }

    .form-group input[type="text"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .form-group input[type="text"]:focus {
        border-color: #e67e22;
        outline: none;
        box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
    }

    /* File Input Styling */
    .form-group input[type="file"] {
        width: 100%;
        padding: 10px;
        background: #f8f9fa;
        border: 1px dashed #ccc;
        border-radius: 8px;
        cursor: pointer;
        box-sizing: border-box;
    }

    /* Submit Button Styling */
    .submit-btn {
        width: 100%;
        padding: 14px;
        background-color: #e67e22;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.1s ease;
    }

    .submit-btn:hover {
        background-color: #d35400;
    }

    .submit-btn:active {
        transform: scale(0.98);
    }
</style>

<div class="form-container">
    <h1 class="form-title">Share Your Thoughts for Our Restaurant</h1>
    
    <form action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" placeholder="Share your experience">
        </div>

        <div class="form-group">
            <label for="profile">Profile / Image</label>
            <input type="file" id="profile" required name="image" accept="image/*">
        </div>

        <button type="submit" class="submit-btn">Submit Feedback</button>
    </form>
</div>

{% endblock %}
